<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Radio Fantasy Praha</title>

<link rel="stylesheet" href="css/myCast.min.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

.wrapper{
    max-width:700px;
    margin:30px auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.audio-player{
    margin-bottom:30px;
}

audio{
    width:100%;
}
</style>

<script src="https://code.jquery.com/jquery-3.0.0.min.js"></script>
</head>

<body>

<div class="wrapper">

<h1>Radio Fantasy Praha</h1>

<div class="audio-player">
    <audio controls preload="none">
        <source src="https://streamsrv-fantasy.kechit.eu/fantasy_praha_main" type="audio/mpeg">
        Ihr Browser unterstützt kein HTML5-Audio.
    </audio>
</div>

<div id="radio1" class="myCast"></div>

</div>

<script src="js/myCast.min.js"></script>

<script>
$(document).ready(function(){

    $("#radio1").myCast({
        URL: "https://streamsrv-fantasy.kechit.eu",
        version: "icecast",
        mount_point: "fantasy_praha_main",
        bg: "darkblue",
        accent: "amber",
        artwork: true,
        blur: true,
        blur_opacity: 0.20,
        autoplay: false,
        volume: 0.8
    });

});
</script>

</body>
</html>

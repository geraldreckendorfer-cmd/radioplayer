<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Radio Fantasy Praha</title>

<link rel="stylesheet" href="css/myCast.min.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    font-family:Arial, sans-serif;
}
.player-container{
    max-width:500px;
    margin:50px auto;
}
</style>

<script src="https://code.jquery.com/jquery-3.0.0.min.js"></script>
</head>

<body>

<div class="player-container">
    <div class="myCast" id="radio1"></div>
</div>

<script src="js/myCast.min.js"></script>

<script>
$("#radio1").myCast({
    URL: "https://streamsrv-fantasy.kechit.eu:80",
    version: "icecast",
    mount_point: "fanatsy_praha_main",
    bg: "darkblue",
    accent: "amber",
    artwork: true,
    blur: true,
    blur_opacity: 0.25,
    autoplay: false,
    volume: 0.8
});
</script>

</body>
</html>
